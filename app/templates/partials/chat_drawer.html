<!-- Chat overlay + drawer -->
<div id="chat-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s" onclick="closeChat()"></div>
<aside id="chat-drawer" style="position:fixed;top:0;right:0;bottom:0;width:400px;max-width:100vw;background:#0f1115;border-left:1px solid rgba(232,230,225,0.09);z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column">
  <div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(232,230,225,0.08);flex:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c8a24a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div style="flex:1;min-width:0">
      <div id="chat-title" style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#f4f2ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      <div id="chat-subtitle" style="font-size:12px;color:#6c727b"></div>
    </div>
    <button onclick="closeChat()" style="width:34px;height:34px;border-radius:9px;border:1px solid rgba(232,230,225,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa0a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px">
    <div id="chat-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex:1;text-align:center;color:#6c727b;font-size:13.5px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3a4049" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Sin mensajes. Escribe para iniciar la conversación.</span>
    </div>
  </div>

  <!-- Image preview bar (hidden by default) -->
  <div id="chat-img-preview" style="display:none;padding:10px 18px 0;border-top:1px solid rgba(232,230,225,0.08);flex:none">
    <div style="position:relative;display:inline-block">
      <img id="chat-img-thumb" src="" alt="preview" style="height:72px;border-radius:8px;border:1px solid rgba(232,230,225,0.15);object-fit:cover;max-width:120px">
      <button onclick="clearChatImage()" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:#e05252;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <form id="chat-form" onsubmit="sendChatMsg(event)" style="display:flex;gap:8px;padding:14px 18px;border-top:1px solid rgba(232,230,225,0.08);flex:none;align-items:center">
    <!-- Hidden file input -->
    <input id="chat-file-input" type="file" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" onchange="onChatImageSelected(event)">
    <!-- Paperclip button -->
    <button type="button" onclick="document.getElementById('chat-file-input').click()" title="Adjuntar imagen"
      style="width:44px;height:44px;border-radius:10px;border:1px solid rgba(232,230,225,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:border-color .15s"
      onmouseover="this.style.borderColor='rgba(200,162,74,0.4)'" onmouseout="this.style.borderColor='rgba(232,230,225,0.12)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <input id="chat-input" type="text" placeholder="Escribe un mensaje…" autocomplete="off" maxlength="1000"
      style="flex:1;background:#14181f;border:1px solid rgba(232,230,225,0.12);border-radius:10px;padding:0 14px;height:44px;color:#e8e6e1;font-size:14px;font-family:'Hanken Grotesk',sans-serif;outline:none"
      onfocus="this.style.borderColor='rgba(200,162,74,0.4)'" onblur="this.style.borderColor='rgba(232,230,225,0.12)'">
    <button type="submit" style="width:44px;height:44px;border-radius:10px;border:none;background:linear-gradient(135deg,#e0c074,#c8a24a);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f1115" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
    </button>
  </form>
</aside>

<script>
let _chatSaleId=null,_chatPoll=null,_chatImageFile=null;

function openChat(saleId, title, partner){
  _chatSaleId=saleId;
  document.getElementById('chat-title').textContent=title;
  document.getElementById('chat-subtitle').textContent='Chat con '+partner;
  document.getElementById('chat-overlay').style.opacity='1';
  document.getElementById('chat-overlay').style.pointerEvents='all';
  document.getElementById('chat-drawer').style.transform='translateX(0)';
  document.body.style.overflow='hidden';
  loadMessages();
  clearInterval(_chatPoll);
  _chatPoll=setInterval(loadMessages,5000);
}

function closeChat(){
  document.getElementById('chat-overlay').style.opacity='0';
  document.getElementById('chat-overlay').style.pointerEvents='none';
  document.getElementById('chat-drawer').style.transform='translateX(100%)';
  document.body.style.overflow='';
  clearInterval(_chatPoll);
  _chatSaleId=null;
  clearChatImage();
}

async function loadMessages(){
  if(!_chatSaleId)return;
  try{
    const r=await fetch(`/api/users/me/sales/${_chatSaleId}/messages`,{credentials:'include'});
    if(!r.ok)return;
    const msgs=await r.json();
    renderMessages(msgs);
  }catch{}
}

function renderMessages(msgs){
  const container=document.getElementById('chat-messages');
  const empty=document.getElementById('chat-empty');
  if(!msgs.length){
    empty.style.display='flex';
    container.querySelectorAll('.chat-bubble').forEach(el=>el.remove());
    return;
  }
  empty.style.display='none';
  const existingIds=new Set();
  container.querySelectorAll('.chat-bubble').forEach(el=>existingIds.add(el.dataset.id));
  let added=false;
  msgs.forEach(m=>{
    if(existingIds.has(String(m.id)))return;
    added=true;
    const div=document.createElement('div');
    div.className='chat-bubble';
    div.dataset.id=m.id;
    const align=m.mine?'flex-end':'flex-start';
    const bg=m.mine?'rgba(200,162,74,0.15)':'#1a1f28';
    const border=m.mine?'rgba(200,162,74,0.3)':'rgba(232,230,225,0.1)';
    const dt=new Date(m.created_at);
    const time=dt.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const senderHtml=!m.mine?`<div style="font-size:11px;font-weight:700;color:#c8a24a;margin-bottom:3px">${esc(m.sender_name)}</div>`:'';
    const textHtml=m.body?`<div style="font-size:13.5px;color:#e8e6e1;line-height:1.45;word-break:break-word">${esc(m.body)}</div>`:'';
    const imgHtml=m.image_url?`<img src="${esc(m.image_url)}" alt="imagen" loading="lazy"
      onclick="window.open(this.src,'_blank')"
      style="max-width:100%;max-height:260px;border-radius:8px;margin-top:${m.body?'8px':'0'};display:block;cursor:zoom-in;border:1px solid rgba(232,230,225,0.1)">`:'';
    div.style.cssText=`align-self:${align};max-width:82%;display:flex;flex-direction:column;gap:4px`;
    div.innerHTML=`
      <div style="background:${bg};border:1px solid ${border};border-radius:12px;padding:10px 14px">
        ${senderHtml}${textHtml}${imgHtml}
      </div>
      <span style="font-size:10.5px;color:#5c626b;padding:0 4px;${m.mine?'text-align:right':''}">${time}</span>`;
    container.appendChild(div);
  });
  if(added)container.scrollTop=container.scrollHeight;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function onChatImageSelected(e){
  const file=e.target.files[0];
  if(!file)return;
  _chatImageFile=file;
  const url=URL.createObjectURL(file);
  document.getElementById('chat-img-thumb').src=url;
  document.getElementById('chat-img-preview').style.display='block';
}

function clearChatImage(){
  _chatImageFile=null;
  const input=document.getElementById('chat-file-input');
  input.value='';
  const thumb=document.getElementById('chat-img-thumb');
  if(thumb.src.startsWith('blob:'))URL.revokeObjectURL(thumb.src);
  thumb.src='';
  document.getElementById('chat-img-preview').style.display='none';
}

async function sendChatMsg(e){
  e.preventDefault();
  const input=document.getElementById('chat-input');
  const bodyText=input.value.trim();
  if(!bodyText&&!_chatImageFile)return;
  if(!_chatSaleId)return;
  input.value='';
  const fd=new FormData();
  if(bodyText)fd.append('body',bodyText);
  if(_chatImageFile)fd.append('image',_chatImageFile);
  clearChatImage();
  try{
    const r=await fetch(`/api/users/me/sales/${_chatSaleId}/messages`,{
      method:'POST',
      body:fd,
      credentials:'include'
    });
    if(r.ok){
      const m=await r.json();
      renderMessages([m]);
    }
  }catch{}
}
</script>
