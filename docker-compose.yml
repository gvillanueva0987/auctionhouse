version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: rareza_db
      MYSQL_USER: rareza
      MYSQL_PASSWORD: rareza_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "rareza", "-prareza_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
      - uploads_data:/code/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
